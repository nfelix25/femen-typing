<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <!-- displays site properly based on user's device -->

        <link
            rel="icon"
            type="image/png"
            sizes="32x32"
            href="./assets/images/favicon-32x32.png"
        />

        <link rel="stylesheet" href="reset.css" />
        <link rel="stylesheet" href="style.css" />

        <script src="index.js" defer></script>
        <script src="my-button.js" defer></script>
        <script src="my-text.js" defer></script>

        <title>Frontend Mentor | Typing Speed Test</title>
    </head>
    <body>
        <header>
            <img src="assets/images/logo-large.svg" />
            <span
                ><img
                    src="assets/images/icon-personal-best.svg"
                /><my-text-4-dark>Personal Best: </my-text-4-dark
                ><my-text-4>--WPM</my-text-4></span
            >
        </header>
        <main>
            <header>
                <ul id="stats">
                    <li>
                        <my-text-3-dark>WPM:</my-text-3-dark
                        ><my-text-2-semi>--</my-text-2-semi>
                    </li>
                    <li>
                        <my-text-3-dark>Accuracy:</my-text-3-dark
                        ><my-text-2-semi>100%</my-text-2-semi>
                    </li>
                    <li>
                        <my-text-3-dark>Time:</my-text-3-dark
                        ><my-timer id="time">456</my-timer>
                    </li>
                </ul>
                <span id="settings">SETTINGS</span>
            </header>
        </main>

        <my-toggle id="time-toggle" label="Start"></my-toggle>
        <my-button
            class="secondary"
            icon="assets/images/icon-restart.svg"
            label="MAKE ME RESET"
        ></my-button>
    </body>
</html>
