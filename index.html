<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <!-- displays site properly based on user's device -->

        <link
            rel="icon"
            type="image/png"
            sizes="32x32"
            href="./assets/images/favicon-32x32.png"
        />

        <link rel="stylesheet" href="style.css" />

        <script src="my-button.js" defer></script>
        <script src="my-text.js" defer></script>

        <title>Frontend Mentor | Typing Speed Test</title>
    </head>
    <body>
        <header>
            <img src="assets/images/logo-large.svg" />
            <span
                ><img src="assets/images/icon-personal-best.svg" /><my-text
                    preset="4"
                    variant="dark"
                    >Personal Best: </my-text
                ><my-text preset="4">--WPM</my-text></span
            >
        </header>
        <main>
            <header>
                <span id="stats"
                    ><span
                        ><my-text preset="3" variant="dark">WPM:</my-text
                        ><my-text preset="2" semi-bold>--</my-text></span
                    ><span
                        ><my-text preset="3" variant="dark">Accuracy:</my-text
                        ><my-text preset="2" semi-bold>100%</my-text></span
                    ><span
                        ><my-text preset="3" variant="dark">Time:</my-text
                        ><my-text preset="2" semi-bold>456</my-text></span
                    ></span
                ><span id="settings">SETTINGS</span>
            </header>
        </main>

        <my-button label="Primary Button"></my-button>
        <my-button
            class="secondary"
            icon="assets/images/icon-restart.svg"
            label="Secondary Button"
        ></my-button>
    </body>
</html>
