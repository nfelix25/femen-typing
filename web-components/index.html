<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <!-- displays site properly based on user's device -->

        <link
            rel="icon"
            type="image/png"
            sizes="32x32"
            href="./assets/images/favicon-32x32.png"
        />

        <link rel="stylesheet" href="reset.css" />
        <link rel="stylesheet" href="style.css" />

        <script type="module" src="index.js" defer></script>

        <title>Frontend Mentor | Typing Speed Test</title>
    </head>
    <body>
        <header>
            <picture>
                <source
                    media="(min-width: 768px)"
                    srcset="assets/images/logo-large.svg"
                />
                <img src="assets/images/logo-small.svg" />
            </picture>
            <span
                ><img
                    src="assets/images/icon-personal-best.svg"
                /><my-text-4-dark>Personal Best: </my-text-4-dark
                ><my-text-4>--WPM</my-text-4></span
            >
        </header>
        <main>
            <header>
                <ul class="header-list" id="stats">
                    <li>
                        <my-text-3-dark>WPM:</my-text-3-dark
                        ><my-text-2-semi>--</my-text-2-semi>
                    </li>
                    <li>
                        <my-text-3-dark>Accuracy:</my-text-3-dark
                        ><my-text-2-semi>--%</my-text-2-semi>
                    </li>
                    <li>
                        <my-text-3-dark>Time:</my-text-3-dark
                        ><my-timer id="time">-.--</my-timer>
                    </li>
                </ul>
                <menu-group class="header-list" id="settings">
                    <li>
                        <my-text-4-dark>Language: </my-text-4-dark
                        ><chip-group id="language-selector"
                            ><my-chip data-label="Standard">Standard</my-chip
                            ><my-chip data-label="TypeScript"
                                >TypeScript</my-chip
                            ></chip-group
                        >
                    </li>
                    <li>
                        <my-text-4-dark>Difficulty: </my-text-4-dark
                        ><chip-group id="difficulty-selector"
                            ><my-chip data-label="Easy">Easy</my-chip
                            ><my-chip data-label="Medium">Medium</my-chip
                            ><my-chip data-label="Hard"
                                >Hard</my-chip
                            ></chip-group
                        >
                    </li>
                    <li>
                        <my-text-4-dark>Mode: </my-text-4-dark
                        ><chip-group id="mode-selector"
                            ><my-chip data-label="Timed">Timed</my-chip
                            ><my-chip data-label="Passage"
                                >Passage</my-chip
                            ></chip-group
                        >
                    </li>
                </menu-group>
            </header>
            <my-typing tabindex="0" id="typing-entry"></my-typing>
            <my-button
                class="secondary"
                icon="assets/images/icon-restart.svg"
                label="RESET"
                id="reset-timer"
            ></my-button>
        </main>
    </body>
</html>
